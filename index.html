<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a0f2e">
  <title>선택 도우미 · Choice Helper</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="app" id="app">
    <!-- 1. 메인: 모드 선택 -->
    <section class="screen screen--home" id="screen-home">
      <header class="app-header">
        <h1 class="app-title">선택 도우미</h1>
        <p class="app-subtitle">주사위를 굴려 결정을 도와드려요</p>
      </header>

      <div class="type-grid" id="mode-list">
        <button class="type-card" data-count="1">
          <span class="type-card__glyph">A</span>
          <span class="type-card__sub">SINGLE CHOICE</span>
          <span class="type-card__ko">단독 평가 (A)</span>
        </button>
        <button class="type-card" data-count="2">
          <span class="type-card__glyph">A<em>/</em>B</span>
          <span class="type-card__sub">COMPARISON</span>
          <span class="type-card__ko">양자택일 (A/B)</span>
        </button>
        <button class="type-card" data-count="3">
          <span class="type-card__glyph">A<em>/</em>B<em>/</em>C</span>
          <span class="type-card__sub">TRIPLE CHOICE</span>
          <span class="type-card__ko">삼자택일 (A/B/C)</span>
        </button>
        <button class="type-card" data-count="4">
          <span class="type-card__glyph">A<em>/</em>B<em>/</em>C<em>/</em>D</span>
          <span class="type-card__sub">MULTI CHOICE</span>
          <span class="type-card__ko">다중선택 (A/B/C/D)</span>
        </button>
      </div>
    </section>

    <!-- 2. 라벨 입력 -->
    <section class="screen screen--labels is-hidden" id="screen-labels">
      <header class="app-header">
        <h2 class="screen-title" id="labels-title">선택지 이름 붙이기</h2>
        <p class="app-subtitle">비워두면 A·B·C·D로 표시돼요</p>
      </header>

      <form class="label-form" id="label-form">
        <div class="label-inputs" id="label-inputs"><!-- 동적 생성 --></div>
        <div class="label-actions">
          <button type="submit" class="btn btn--primary">주사위 굴리기</button>
          <button type="button" class="btn btn--ghost" id="skip-btn">건너뛰기</button>
        </div>
      </form>
      <button type="button" class="link-back" id="labels-back">← 처음으로</button>
    </section>

    <!-- 3. 결과 -->
    <section class="screen screen--result is-hidden" id="screen-result">
      <header class="app-header">
        <h2 class="screen-title">결과</h2>
      </header>

      <!-- 3D 주사위 스테이지 (WebGL 미지원 시 CSS fallback 표시) -->
      <div class="dice-stage" id="dice-stage">
        <div class="dice-glow" aria-hidden="true"></div>
        <canvas class="dice-canvas" id="dice-canvas"></canvas>
        <div class="dice-fallback is-hidden" id="dice-fallback" aria-hidden="true">
          <div class="dice-fallback__cube"><span id="dice-fallback-num">20</span></div>
        </div>
        <p class="dice-caption" id="dice-caption"></p>
        <p class="dice-hint is-hidden" id="dice-hint">화면을 탭하면 건너뛰기</p>
      </div>

      <p class="tie-banner is-hidden" id="tie-banner">동점이에요! 다시 굴려볼까요?</p>

      <div class="result-list" id="result-list"><!-- 동적 생성 --></div>

      <div class="result-actions">
        <button type="button" class="btn btn--primary" id="reroll-btn">다시 굴리기</button>
        <button type="button" class="btn btn--ghost" id="result-home">처음으로</button>
      </div>
    </section>
  </main>

  <!-- 순수 로직 (DOM 비의존) -->
  <script src="js/dice.js"></script>
  <!-- 3D 주사위 렌더러 (Three.js, ES 모듈 / 로컬 번들). 로드 실패 시 app.js가 CSS fallback으로 동작 -->
  <script type="module" src="js/dice3d.js"></script>
  <!-- 뷰/컨트롤러 -->
  <script src="js/app.js"></script>
</body>
</html>
